<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const EXERCISES_A = [
      { id: "squat", name: "סקוואט מלא", nameEn: "Full Squat", sets: 4, reps: "4-6", hasWarmup: true, type: "weight" },

      { id: "bench", name: "לחיצת חזה", nameEn: "Bench Press", sets: 4, reps: "4-6", hasWarmup: true, type: "weight" },
      { id: "pullups", name: "מתח", nameEn: "Pull-ups", sets: 3, reps: "4-6", type: "weight" },

      { id: "hip_abduction", name: "הרחקת ירך (כבל)", nameEn: "Cable Hip Abduction", sets: 2, reps: "8-10", type: "weight", perSide: true, superset: "hip" },
      { id: "calf_raise", name: "הרמת עקבים", nameEn: "Calf Raise", sets: 3, reps: "10-12", type: "weight" },

    const GOALS = {
      squat: { value: 85, unit: "ק״ג", note: "טמפו 3-1-1 ×10" }, rdl: { value: 120, unit: "ק״ג" },
      bench: { value: 70, unit: "ק״ג" }, pullups: { value: 25, unit: "ק״ג" }, seated_row: { value: 80, unit: "ק״ג" },
      dead_hang: { value: 75, unit: "שנ׳" }, woodchop: { value: 60, unit: "ק״ג" }, plank: { value: 90, unit: "שנ׳" },
      ohp: { value: 26, unit: "ק״ג" }, pullups_b: { value: 25, unit: "ק״ג" }, lunges: { value: 25, unit: "ק״ג" },
      good_morning: { value: 80, unit: "ק״ג" }, cossack: { value: 40, unit: "ק״ג" }, hip_flexion: { value: 50, unit: "ק״ג" },
      hip_abduction: { value: 25, unit: "ק״ג" }, calf_raise: { value: 60, unit: "ק״ג" }, triceps_ext: { value: 35, unit: "ק״ג" },
      incline_curl: { value: 20, unit: "ק״ג" }, russian_twist: { value: 20, unit: "ק״ג", note: "×12 + רגליים" },
    };

    const DATA_KEY = "moshe-workouts";
    const ACTIVITY_TYPES = [
      { id: "swim", name: "שחייה", icon: "🏊" },
      { id: "stairs", name: "מדרגות", icon: "🪜" },
      { id: "climb", name: "טיפוס", icon: "🧗" },
    ];

    const T = {
      bg: "#04080f", card: "rgba(15, 25, 45, 0.85)", cardSolid: "#0f192d",
      blue: "#3b82f6", blueLight: "#60a5fa", blueGlow: "rgba(59, 130, 246, 0.12)",
      blueGlow2: "rgba(59, 130, 246, 0.25)", cyan: "#22d3ee", white: "#f1f5f9",
      dim: "#64748b", dimLight: "#94a3b8", border: "rgba(59, 130, 246, 0.12)",
      borderLight: "rgba(148, 163, 184, 0.15)", success: "#10b981",
      successGlow: "rgba(16, 185, 129, 0.15)", warn: "#f59e0b",
      warnGlow: "rgba(245, 158, 11, 0.15)", danger: "#ef4444",
      purple: "#a78bfa", purpleGlow: "rgba(167, 139, 250, 0.15)",
    };

    const inputStyle = {
      background: "rgba(15, 25, 45, 0.6)", border: "1px solid " + T.borderLight,
      borderRadius: 10, padding: "11px 10px", color: T.white, fontSize: 15,
      outline: "none", direction: "ltr", textAlign: "center", width: "100%",
      boxSizing: "border-box", transition: "border-color 0.2s",
    };

    function hasFilled(s, t) {
      return t === "time" ? s.time !== "" && s.time !== undefined : (s.weight !== "" && s.weight !== undefined) && (s.reps !== "" && s.reps !== undefined);
    }

    async function loadAll() {
      try {
        const r = localStorage.getItem(DATA_KEY);
        if (r) return { data: JSON.parse(r), status: "ok" };
      } catch (e) { }
      return { data: null, status: "empty" };
    }

    async function saveAll(data) {
      try {
        localStorage.setItem(DATA_KEY, JSON.stringify(data));
        return "ok";
      } catch (e) { return "err:" + String(e.message || e).slice(0, 50); }
    }

    const fmtD = (iso) => new Date(iso).toLocaleDateString("he-IL", { day: "numeric", month: "short" });
    const fmtDY = (iso) => new Date(iso).toLocaleDateString("he-IL", { day: "numeric", month: "short", year: "numeric" });
    const fmtT = (iso) => new Date(iso).toLocaleTimeString("he-IL", { hour: "2-digit", minute: "2-digit" });

    function buildSeedData() {
      const seedB = { id: "seed_b_20260223", type: "B", date: "2026-02-23T10:00:00.000Z", finishedAt: "2026-02-23T11:00:00.000Z", notes: "גוד מורנינג והרמת עקבים - דילוג עד שלומדים טכניקה עם המאמנת.",
      exercises: EXERCISES_B.map(ex => { const v = { ohp: { w: "20", r: "6" }, pullups_b: { w: "21", r: "6" }, lunges: { w: "17.5", r: "8" }, good_morning: null, cossack: { w: "22.5", r: "6" }, hip_flexion: { w: "12.5", r: "8" }, hip_abduction: { w: "12.5", r: "8" }, calf_raise: null, triceps_ext: { w: "27.5", r: "6" }, incline_curl: { w: "15", r: "6" }, russian_twist: { w: "20", r: "8" } }[ex.id]; const sk = v === null;
      return { ...ex, skipped: sk, sets_data: Array.from({ length: ex.sets + (ex.hasWarmup ? 1 : 0) }, (_, i) => ({ isWarmup: ex.hasWarmup && i === 0, weight: (!sk && v && !(ex.hasWarmup && i === 0)) ? v.w : "", reps: (!sk && v && !(ex.hasWarmup && i === 0)) ? v.r : "", time: "" })) }; }) };
      
      const seedA = { id: "seed_a_20260225", type: "A", date: "2026-02-25T10:00:00.000Z", finishedAt: "2026-02-25T11:15:00.000Z", notes: "בנצ׳ תפוס - החלפתי בלחיצת כתף בישיבה: 15×8, 17.5×6, 20×9.",
      exercises: EXERCISES_A.map(ex => { const m = { squat: [{ isWarmup: true, weight: "20", reps: "8", time: "" }, { isWarmup: false, weight: "60", reps: "6", time: "" }, { isWarmup: false, weight: "80", reps: "4", time: "" }, { isWarmup: false, weight: "90", reps: "2", time: "" }, { isWarmup: false, weight: "100", reps: "6", time: "" }], rdl: [{ isWarmup: true, weight: "20", reps: "8", time: "" }, { isWarmup: false, weight: "60", reps: "6", time: "" }, { isWarmup: false, weight: "70", reps: "4", time: "" }, { isWarmup: false, weight: "80", reps: "4", time: "" }, { isWarmup: false, weight: "95", reps: "6", time: "" }], bench: null, pullups: [{ isWarmup: false, weight: "21", reps: "6", time: "" }, { isWarmup: false, weight: "21", reps: "6", time: "" }, { isWarmup: false, weight: "14", reps: "6", time: "" }], seated_row: [{ isWarmup: false, weight: "50", reps: "8", time: "" }, { isWarmup: false, weight: "60", reps: "6", time: "" }, { isWarmup: false, weight: "70", reps: "6", time: "" }, { isWarmup: false, weight: "70", reps: "6", time: "" }], dead_hang: [{ isWarmup: false, weight: "", reps: "", time: "30" }, { isWarmup: false, weight: "", reps: "", time: "30" }], woodchop: [{ isWarmup: false, weight: "25", reps: "8", time: "" }, { isWarmup: false, weight: "32.5", reps: "8", time: "" }, { isWarmup: false, weight: "32.5", reps: "8", time: "" }], plank: [{ isWarmup: false, weight: "", reps: "", time: "60" }, { isWarmup: false, weight: "", reps: "", time: "60" }] };
      if (m[ex.id] === null) return { ...ex, skipped: true, sets_data: Array.from({ length: ex.sets + (ex.hasWarmup ? 1 : 0) }, (_, i) => ({ isWarmup: ex.hasWarmup && i === 0, weight: "", reps: "", time: "" })) };
      return { ...ex, skipped: false, sets_data: m[ex.id] }; }) };
      
      const seedB2 = { id: "seed_b2_20260227", type: "B", date: "2026-02-27T10:36:00.000Z", finishedAt: "2026-02-27T11:30:00.000Z", notes: "גוד מורנינג פעם ראשונה כאימון מלא. מתח המכונה בתקלה ותקועה על 21. לאנג׳ים ירידה במשקל בעקבות שיפור בטכניקה.",
      exercises: EXERCISES_B.map(ex => { const m = { ohp: [{ isWarmup: false, weight: "15", reps: "8", time: "" }, { isWarmup: false, weight: "17.5", reps: "4", time: "" }, { isWarmup: false, weight: "20", reps: "6", time: "" }, { isWarmup: false, weight: "21.4", reps: "4", time: "" }], pullups_b: [{ isWarmup: false, weight: "21", reps: "6", time: "" }, { isWarmup: false, weight: "21", reps: "6", time: "" }, { isWarmup: false, weight: "21", reps: "6", time: "" }], lunges: [{ isWarmup: false, weight: "17.5", reps: "8", time: "" }, { isWarmup: false, weight: "15", reps: "6", time: "" }, { isWarmup: false, weight: "12.5", reps: "6", time: "" }], good_morning: [{ isWarmup: true, weight: "20", reps: "8", time: "" }, { isWarmup: false, weight: "40", reps: "6", time: "" }, { isWarmup: false, weight: "50", reps: "6", time: "" }, { isWarmup: false, weight: "60", reps: "6", time: "" }], cossack: [{ isWarmup: false, weight: "24", reps: "8", time: "" }, { isWarmup: false, weight: "24", reps: "8", time: "" }, { isWarmup: false, weight: "32", reps: "8", time: "" }], hip_flexion: [{ isWarmup: false, weight: "34", reps: "10", time: "" }, { isWarmup: false, weight: "42", reps: "10", time: "" }], hip_abduction: [{ isWarmup: false, weight: "12.5", reps: "10", time: "" }, { isWarmup: false, weight: "18", reps: "10", time: "" }], calf_raise: null, triceps_ext: [{ isWarmup: false, weight: "27.5", reps: "8", time: "" }, { isWarmup: false, weight: "30", reps: "6", time: "" }, { isWarmup: false, weight: "30", reps: "6", time: "" }], incline_curl: [{ isWarmup: false, weight: "12.5", reps: "8", time: "" }, { isWarmup: false, weight: "15", reps: "6", time: "" }, { isWarmup: false, weight: "17.5", reps: "6", time: "" }], russian_twist: [{ isWarmup: false, weight: "10", reps: "8", time: "" }, { isWarmup: false, weight: "20", reps: "8", time: "" }] };
      if (m[ex.id] === null) return { ...ex, skipped: true, sets_data: Array.from({ length: ex.sets + (ex.hasWarmup ? 1 : 0) }, (_, i) => ({ isWarmup: ex.hasWarmup && i === 0, weight: "", reps: "", time: "" })) };
      return { ...ex, skipped: false, sets_data: m[ex.id] }; }) };
      
      const seedA2 = JSON.parse(JSON.stringify(seedA)); seedA2.id = "restored_a_20260305"; seedA2.date = "2026-03-05T10:00:00.000Z"; seedA2.finishedAt = "2026-03-05T11:15:00.000Z"; seedA2.notes = "";
      return { workouts: [seedA2, seedB2, seedA, seedB], bodyLogs: [], activities: [] };
    }

    function WorkoutTracker() {
      const [view, setView] = useState("home");
      const [workouts, setWorkouts] = useState([]);
      const [bodyLogs, setBodyLogs] = useState([]);
      const [activities, setActivities] = useState([]);
      const [cw, setCw] = useState(null);
      const [editingId, setEditingId] = useState(null);
      const [loading, setLoading] = useState(true);
      const [expEx, setExpEx] = useState(null);
      const [hFilter, setHFilter] = useState("all");
      const [notif, setNotif] = useState(null);
      const [exportModal, setExportModal] = useState(null);
      const [selActivity, setSelActivity] = useState(null);
      const [actDur, setActDur] = useState("");
      const [actNote, setActNote] = useState("");
      const [confirmDel, setConfirmDel] = useState(null);
      const [dbg, setDbg] = useState("");
      const [backupModal, setBackupModal] = useState(null);
      const [restoreText, setRestoreText] = useState("");

      const notify = (m) => { setNotif(m); setTimeout(() => setNotif(null), 2500); };

      const persist = useCallback(async (w, b, a, label) => {
        const blob = { workouts: w, bodyLogs: b, activities: a, savedAt: new Date().toISOString() };
        const result = await saveAll(blob);
        setDbg(label + ":" + result + " w:" + w.length + " b:" + b.length + " a:" + a.length);
        return result;
      }, []);

      useEffect(() => {
        (async () => {
          const { data, status } = await loadAll();
          if (data && data.workouts) {
            setWorkouts(data.workouts); setBodyLogs(data.bodyLogs || []); setActivities(data.activities || []);
            setDbg("loaded:" + status + " w:" + data.workouts.length);
          } else {
            const seed = buildSeedData();
            setWorkouts(seed.workouts); setBodyLogs(seed.bodyLogs); setActivities(seed.activities);
            const sr = await saveAll({ ...seed, savedAt: new Date().toISOString() });
            setDbg("seeded:" + sr + " w:" + seed.workouts.length);
          }
          setLoading(false);
        })();
      }, []);

      const saveW = async (w) => { setWorkouts(w); await persist(w, bodyLogs, activities, "saveW"); };
      const saveB = async (b) => { setBodyLogs(b); await persist(workouts, b, activities, "saveB"); };
      const saveAc = async (a) => { setActivities(a); await persist(workouts, bodyLogs, a, "saveAc"); };

      const startWorkout = (type) => {
        const exs = type === "A" ? EXERCISES_A : EXERCISES_B;
        const last = workouts.find(w => w.type === type);
        setCw({ id: Date.now().toString(), type, date: new Date().toISOString(), notes: "",
        exercises: exs.map(ex => { const prev = last ? last.exercises.find(e => e.id === ex.id) : null;
        if (prev && !prev.skipped) return { ...ex, skipped: false, sets_data: prev.sets_data.map(s => ({ ...s })) };
        return { ...ex, skipped: prev?.skipped || false, sets_data: Array.from({ length: ex.sets + (ex.hasWarmup ? 1 : 0) }, (_, i) => ({ isWarmup: ex.hasWarmup && i === 0, weight: "", reps: "", time: "" })) }; }),
        }); setView("active"); setExpEx(0);
      };

      const updateSet = (ei, si, f, v) => setCw(p => { const n = JSON.parse(JSON.stringify(p)); n.exercises[ei].sets_data[si][f] = v; return n; });
      const toggleSkip = (ei) => setCw(p => { const n = JSON.parse(JSON.stringify(p)); n.exercises[ei].skipped = !n.exercises[ei].skipped; return n; });
      const addSet = (ei) => setCw(p => { const n = JSON.parse(JSON.stringify(p)); n.exercises[ei].sets_data.push({ isWarmup: false, weight: "", reps: "", time: "" }); return n; });
      const removeSet = (ei) => setCw(p => { const n = JSON.parse(JSON.stringify(p)); const s = n.exercises[ei].sets_data; for (let i = s.length - 1; i >= 0; i--) { if (!s[i].isWarmup) { s.splice(i, 1); break; } } return n; });

      const finish = async () => {
        if (!cw) return; const done = { ...cw, finishedAt: new Date().toISOString() }; const was = !!editingId;
        const upd = editingId ? workouts.map(w => w.id === editingId ? done : w) : [done, ...workouts];
        if (editingId) setEditingId(null);
        setWorkouts(upd); await persist(upd, bodyLogs, activities, "finish");
        setCw(null); setView(was ? "history" : "home"); notify(was ? "עודכן ✏️" : "נשמר! 🎯");
      };
      const editW = (w) => { setEditingId(w.id); setCw(JSON.parse(JSON.stringify(w))); setView("active"); setExpEx(0); };
      const deleteW = async (id) => { const upd = workouts.filter(w => w.id !== id); setWorkouts(upd); await persist(upd, bodyLogs, activities, "del"); notify("נמחק"); };

      const getHistory = (eid) => workouts.filter(w => w.exercises?.some(e => e.id === eid && !e.skipped)).map(w => {
        const ex = w.exercises.find(e => e.id === eid); const ws = ex.sets_data.filter(s => !s.isWarmup && hasFilled(s, ex.type));
        return { date: w.date, maxW: Math.max(0, ...ws.map(s => parseFloat(s.weight) || 0)), maxT: Math.max(0, ...ws.map(s => parseFloat(s.time) || 0)), vol: ws.reduce((s, x) => s + (parseFloat(x.weight) || 0) * (parseInt(x.reps) || 0), 0) };
      }).reverse();

      const makeBackup = () => JSON.stringify({ workouts, bodyLogs, activities, backupDate: new Date().toISOString() });
      const doRestore = async (jsonStr) => {
        try { const d = JSON.parse(jsonStr); if (!d.workouts || !Array.isArray(d.workouts)) throw new Error("bad");
        setWorkouts(d.workouts); setBodyLogs(d.bodyLogs || []); setActivities(d.activities || []);
        await persist(d.workouts, d.bodyLogs || [], d.activities || [], "restore");
        setBackupModal(null); setRestoreText(""); notify("שוחזר! ✓ " + d.workouts.length + " אימונים");
        } catch (e) { notify("שגיאה — JSON לא תקין"); }
      };

      const exportData = (list) => {
        const L = ["=== דוח אימונים ===", "ייצוא: " + new Date().toLocaleDateString("he-IL"), (bodyLogs.length > 0 ? "משקל גוף אחרון: " + bodyLogs[0].weight + " ק״ג (יעד: 85)" : ""), "סה״כ אימוני כוח: " + list.length, ""].filter(Boolean);
        list.forEach(w => { L.push("— אימון " + w.type + " | " + fmtDY(w.date) + " " + fmtT(w.date) + " —");
        w.exercises.forEach(ex => { if (ex.skipped) { L.push("  " + ex.name + ": דילוג"); return; }
        const ws = ex.sets_data.filter(s => !s.isWarmup && hasFilled(s, ex.type)); const wu = ex.sets_data.find(s => s.isWarmup && hasFilled(s, ex.type));
        if (!ws.length && !wu) return; const str = ex.type === "time" ? ws.map(s => s.time + "s").join(", ") : ws.map(s => s.weight + "×" + s.reps).join(", ");
        L.push("  " + ex.name + " (" + ex.nameEn + "): " + str + (wu ? " [חימום: " + wu.weight + "×" + wu.reps + "]" : "") + (ex.perSide ? " לכל צד" : "")); });
        if (w.notes) L.push("  הערות: " + w.notes); L.push(""); });
        if (bodyLogs.length > 0) { L.push("— משקל גוף —"); bodyLogs.slice(0, 20).forEach(b => L.push("  " + fmtDY(b.date) + ": " + b.weight + " ק״ג")); L.push(""); }
        if (activities.length > 0) { L.push("— פעילויות —"); activities.forEach(a => L.push("  " + fmtDY(a.date) + ": " + a.icon + " " + a.name + " " + a.duration + " דק׳" + (a.notes ? " (" + a.notes + ")" : ""))); }
        return L.join("\n");
      };

      if (loading) return <div style={{ background: T.bg, minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center" }}><div style={{ color: T.blue, fontSize: 18, fontFamily: "'Heebo', sans-serif" }}>טוען...</div></div>;

      const css = `@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap');`;
      const font = "'Heebo', 'SF Pro Display', -apple-system, sans-serif";
      
      const Notif = () => notif ? <div style={{ position: "fixed", top: 20, left: "50%", transform: "translateX(-50%)", background: T.success, color: "#fff", padding: "10px 28px", borderRadius: 50, zIndex: 999, fontSize: 14, fontWeight: 600, fontFamily: font, boxShadow: "0 8px 32px rgba(16,185,129,0.35)" }}>{notif}</div> : null;

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
      {[{ t: "A", sub: "כוח · גב · אחיזה", grad: "linear-gradient(135deg, #1e3a5f 0%, #0f192d 100%)" }, { t: "B", sub: "אתלטיות · שרשרת אחורית", grad: "linear-gradient(135deg, #1a1040 0%, #0f192d 100%)" }].map(w => (
      <button key={w.t} onClick={() => startWorkout(w.t)} style={{ background: w.grad, border: "1px solid " + T.border, borderRadius: 16, padding: "24px 16px", cursor: "pointer", textAlign: "right", position: "relative", overflow: "hidden" }}>
      <div style={{ position: "absolute", top: -20, left: -20, width: 80, height: 80, background: "radial-gradient(circle, " + (w.t === "A" ? T.blueGlow2 : T.purpleGlow) + " 0%, transparent 70%)", borderRadius: "50%" }} />
      <div style={{ position: "relative" }}><div style={{ fontSize: 28, fontWeight: 900, color: w.t === "A" ? T.blue : T.purple, marginBottom: 6 }}>אימון {w.t}</div><div style={{ fontSize: 12, color: T.dim }}>{w.sub}</div></div>

      {workouts.slice(0, 3).map(w => (
      <Card key={w.id} style={{ padding: "14px 18px", marginBottom: 8, display: "flex", justifyContent: "space-between", alignItems: "center" }}>

      <div><div style={{ fontSize: 14, fontWeight: 600 }}>{fmtD(w.date)}</div><div style={{ fontSize: 11, color: T.dim }}>{fmtT(w.date)}</div></div>

      </Card>))}
      </div>}
      {dbg && <div style={{ margin: "20px 24px 0", padding: 10, borderRadius: 8, fontSize: 11, color: T.warn, direction: "ltr", background: "rgba(245,158,11,0.08)", border: "1px solid rgba(245,158,11,0.2)", wordBreak: "break-all", display: "none" }}>🔧 {dbg}</div>}

      // ═══ ACTIVE ═══
      if (view === "active" && cw) {

      const fs = cw.exercises.filter(e => !e.skipped).reduce((s, e) => s + e.sets_data.filter(x => !x.isWarmup && hasFilled(x, e.type)).length, 0);
      const ts = cw.exercises.filter(e => !e.skipped).reduce((s, e) => s + e.sets_data.filter(x => !x.isWarmup).length, 0);
      const pct = ts > 0 ? (fs / ts) * 100 : 0;

      </div>
      <div style={{ padding: "16px 20px" }}>
      {cw.exercises.map((ex, ei) => {
      const isExp = expEx === ei; const fc = ex.sets_data.filter(s => hasFilled(s, ex.type)).length;
      const allF = !ex.skipped && fc === ex.sets_data.length;
      const ssStart = ex.superset && (ei === 0 || cw.exercises[ei - 1]?.superset !== ex.superset);
      const ssEnd = ex.superset && (ei === cw.exercises.length - 1 || cw.exercises[ei + 1]?.superset !== ex.superset);

      return (<div key={ex.id} style={{ marginBottom: ssEnd ? 14 : (ex.superset ? 2 : 14) }}>

      <div style={{ background: T.card, borderRadius: br, border: "1px solid " + (ex.skipped ? T.warn + "33" : allF ? T.success + "33" : T.border), overflow: "hidden", opacity: ex.skipped ? 0.45 : 1 }}>

      </div>

      </button>

      <div style={{ display: "grid", gridTemplateColumns: ex.type === "time" ? "40px 1fr" : "40px 1fr 1fr", gap: 8, marginBottom: 8, fontSize: 10, color: T.dim, textAlign: "center", fontWeight: 600, textTransform: "uppercase" }}>
      <div>סט</div><div>{ex.type === "time" ? "שניות" : "משקל"}</div>{ex.type !== "time" && <div>חזרות</div>}

      {ex.sets_data.map((s, si) => { const filled = hasFilled(s, ex.type);
      return (<div key={si} style={{ display: "grid", gridTemplateColumns: ex.type === "time" ? "40px 1fr" : "40px 1fr 1fr", gap: 8, marginBottom: 8, alignItems: "center" }}>
      <div style={{ textAlign: "center", fontSize: 13, fontWeight: 700, color: s.isWarmup ? T.warn : filled ? T.success : T.dim }}>{s.isWarmup ? "W" : si - (ex.hasWarmup ? 0 : -1)}</div>

      <button onClick={finish} style={{ width: "100%", padding: 16, borderRadius: 14, border: "none", background: ac, color: "#fff", fontSize: 17, fontWeight: 800, cursor: "pointer", fontFamily: font, boxShadow: "0 4px 24px " + ac + "44" }}>{editingId ? "שמור שינויים" : "סיים אימון"}</button>
      </div></div>); }

      // ═══ HISTORY ═══
      if (view === "history") {
      const fil = hFilter === "all" ? workouts : workouts.filter(w => w.type === hFilter);
      return (
      <div dir="rtl" style={{ background: T.bg, minHeight: "100vh", fontFamily: font, color: T.white, paddingBottom: 90 }}>
      <style>{css}</style><Notif /><ConfirmModal /><BackupModal />
      {exportModal && (
      <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.8)", zIndex: 999, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }} onClick={() => setExportModal(null)}>
      <div style={{ background: T.cardSolid, borderRadius: 20, padding: 24, maxWidth: 480, width: "100%", maxHeight: "80vh", display: "flex", flexDirection: "column", border: "1px solid " + T.border }} onClick={e => e.stopPropagation()}>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 16 }}><span style={{ fontSize: 18, fontWeight: 800 }}>ייצוא</span><button onClick={() => setExportModal(null)} style={{ background: "none", border: "none", color: T.dim, fontSize: 20, cursor: "pointer" }}>✕</button></div>
      <textarea readOnly value={exportModal} style={{ flex: 1, background: "rgba(15,25,45,0.5)", border: "1px solid " + T.border, borderRadius: 12, padding: 14, color: T.dimLight, fontSize: 12, fontFamily: "monospace", resize: "none", outline: "none", minHeight: 180, direction: "rtl" }} />
      <button onClick={() => { navigator.clipboard.writeText(exportModal).then(() => { notify("📋 הועתק!"); setExportModal(null); }); }} style={{ marginTop: 14, padding: 14, borderRadius: 14, border: "none", background: T.blue, color: "#fff", fontSize: 16, fontWeight: 700, cursor: "pointer", fontFamily: font }}>📋 העתק הכל</button>
      </div></div>)}
      <div style={{ padding: "28px 24px 16px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 18 }}>
      <span style={{ fontSize: 24, fontWeight: 900 }}>היסטוריה</span>
      <div style={{ display: "flex", gap: 8 }}>
      <button onClick={() => setBackupModal("backup")} style={{ background: T.successGlow, border: "1px solid " + T.success + "33", borderRadius: 12, padding: "9px 14px", cursor: "pointer", fontSize: 13, fontWeight: 600, color: T.success, fontFamily: font }}>💾</button>
      <button onClick={() => setExportModal(exportData(fil))} style={{ background: T.blueGlow, border: "1px solid " + T.border, borderRadius: 12, padding: "9px 18px", cursor: "pointer", fontSize: 13, fontWeight: 600, color: T.blue, fontFamily: font }}>📤 ייצוא</button>
      </div>
      </div>
      <div style={{ display: "flex", gap: 8 }}>
      {["all", "A", "B", "activity"].map(f => (<button key={f} onClick={() => setHFilter(f)} style={{
      background: hFilter === f ? (f === "A" ? T.blueGlow : f === "B" || f === "activity" ? T.purpleGlow : "rgba(255,255,255,0.08)") : "transparent",
      border: "1px solid " + (hFilter === f ? (f === "A" ? T.blue + "44" : T.purple + "44") : "transparent"),
      borderRadius: 10, padding: "8px 16px", color: hFilter === f ? (f === "A" ? T.blue : f === "B" || f === "activity" ? T.purple : T.white) : T.dim, cursor: "pointer", fontSize: 13, fontWeight: 600, fontFamily: font,
      }}>{f === "all" ? "הכל" : f === "activity" ? "🏊" : f}</button>))}
      </div>
      </div>
      <div style={{ padding: "0 24px" }}>
      {hFilter !== "activity" && <>{fil.length === 0 && <div style={{ color: T.dim, textAlign: "center", padding: 40 }}>אין אימונים</div>}
      {fil.map(w => { const tv = w.exercises.reduce((s, e) => s + e.sets_data.filter(x => !x.isWarmup && hasFilled(x, e.type)).reduce((s2, x) => s2 + (parseFloat(x.weight) || 0) * (parseInt(x.reps) || 0), 0), 0);
      return (<Card key={w.id} style={{ padding: 18, marginBottom: 10 }}>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
      <div style={{ width: 34, height: 34, borderRadius: 10, background: w.type === "A" ? T.blueGlow : T.purpleGlow, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 15, fontWeight: 900, color: w.type === "A" ? T.blue : T.purple }}>{w.type}</div>
      <div><div style={{ fontSize: 14, fontWeight: 600 }}>{fmtDY(w.date)}</div><div style={{ fontSize: 11, color: T.dim }}>{fmtT(w.date)} · {Math.round(tv).toLocaleString()} ק״ג</div></div>
      </div>
      <div style={{ display: "flex", gap: 6 }}>
      <button onClick={() => editW(w)} style={{ background: "rgba(255,255,255,0.04)", border: "none", borderRadius: 8, padding: "6px 10px", color: T.dim, cursor: "pointer", fontSize: 14 }}>✏️</button>
      <button onClick={() => setConfirmDel({ msg: "למחוק את האימון?", action: () => deleteW(w.id) })} style={{ background: "rgba(255,255,255,0.04)", border: "none", borderRadius: 8, padding: "6px 10px", color: T.dim, cursor: "pointer", fontSize: 14 }}>🗑</button>
      </div>
      </div>
      {w.notes && <div style={{ fontSize: 12, color: T.dim, marginBottom: 10, fontStyle: "italic" }}>💬 {w.notes}</div>}
      <div>{w.exercises.map(e => { const mx = Math.max(0, ...e.sets_data.filter(s => !s.isWarmup && hasFilled(s, e.type)).map(s => parseFloat(s.weight) || 0));
      return <div key={e.id} style={{ display: "flex", justifyContent: "space-between", padding: "3px 0", fontSize: 13 }}><span style={{ color: e.skipped ? T.warn : T.dim }}>{e.skipped ? "⏭ " : ""}{e.name}</span><span style={{ fontWeight: 600, color: e.skipped ? T.warn : T.dimLight, direction: "ltr" }}>{e.skipped ? "דילוג" : mx > 0 ? mx + "" : e.type === "time" ? "⏱" : "—"}</span></div>; })}</div>
      </Card>); })}</>}
      {(hFilter === "all" || hFilter === "activity") && activities.length > 0 && <>
      {hFilter === "all" && <div style={{ fontSize: 13, fontWeight: 700, color: T.dim, letterSpacing: 2, textTransform: "uppercase", marginTop: 20, marginBottom: 12 }}>פעילויות</div>}
      {activities.map(a => (
      <Card key={a.id} style={{ padding: "14px 18px", marginBottom: 8, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
      <div style={{ width: 34, height: 34, borderRadius: 10, background: T.purpleGlow, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16 }}>{a.icon}</div>
      <div><span style={{ fontSize: 14, fontWeight: 600 }}>{a.name}</span><span style={{ fontSize: 13, color: T.dim, marginRight: 6 }}> · {a.duration} דק׳</span>{a.notes && <span style={{ fontSize: 12, color: T.dim }}> · {a.notes}</span>}</div>
      </div>
      <div style={{ display: "flex", alignItems: "center", gap: 8 }}><span style={{ fontSize: 11, color: T.dim }}>{fmtD(a.date)}</span><button onClick={() => setConfirmDel({ msg: "למחוק?", action: async () => { const na = activities.filter(x => x.id !== a.id); setActivities(na); await persist(workouts, bodyLogs, na, "delAct"); } })} style={{ background: "none", border: "none", color: T.dim, cursor: "pointer", fontSize: 14 }}>🗑</button></div>
      </Card>))} </>}
      {hFilter === "activity" && activities.length === 0 && <div style={{ color: T.dim, textAlign: "center", padding: 40 }}>אין פעילויות</div>}
      </div><Nav /></div>); }

      // ═══ PROGRESS ═══
      if (view === "progress") {
      const allEx = [...EXERCISES_A, ...EXERCISES_B].filter((ex, i, a) => a.findIndex(e => e.id === ex.id) === i);
      return (
      <div dir="rtl" style={{ background: T.bg, minHeight: "100vh", fontFamily: font, color: T.white, paddingBottom: 90 }}>
      <style>{css}</style>
      <div style={{ padding: "28px 24px 16px" }}><div style={{ fontSize: 24, fontWeight: 900, marginBottom: 4 }}>התקדמות</div><div style={{ fontSize: 13, color: T.dim }}>מעקב יעדים · 6 חודשים</div></div>
      {bodyLogs.length > 1 && <div style={{ padding: "0 24px", marginBottom: 24 }}>
      <Card style={{ padding: 18 }}>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 14 }}><span style={{ fontSize: 15, fontWeight: 700 }}>משקל גוף</span><span style={{ fontSize: 13, color: T.dim }}>{bodyLogs[0].weight} ק״ג · יעד 85</span></div>
      <div style={{ display: "flex", alignItems: "flex-end", gap: 4, height: 70 }}>
      {bodyLogs.slice(0, 20).reverse().map((b, i, a) => { const mn = Math.min(...a.map(x => x.weight)); const mx = Math.max(...a.map(x => x.weight)); const r = mx - mn || 1; const h = ((b.weight - mn) / r) * 50 + 20;
      return <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 3 }}><div style={{ fontSize: 9, color: T.dim }}>{b.weight}</div><div style={{ width: "100%", height: h, background: b.weight <= 85 ? T.success : "linear-gradient(to top, " + T.blue + ", " + T.blueLight + ")", borderRadius: 4, minWidth: 6 }} /></div>; })}
      </div></Card></div>}
      <div style={{ padding: "0 24px" }}>
      {allEx.map(exDef => { const goal = GOALS[exDef.id]; if (!goal) return null;
      const h = getHistory(exDef.id); const isTime = exDef.type === "time";
      const cur = h.length > 0 ? (isTime ? h[h.length - 1]?.maxT : h[h.length - 1]?.maxW) || 0 : 0;
      const pct = Math.min(100, goal.value > 0 ? (cur / goal.value) * 100 : 0);
      const reached = cur >= goal.value;
      const barColor = reached ? T.success : pct > 60 ? T.blue : pct > 30 ? T.warn : T.danger;
      return <Card key={exDef.id} style={{ padding: "14px 18px", marginBottom: 8 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
      <div><span style={{ fontSize: 14, fontWeight: 700, color: reached ? T.success : T.white }}>{exDef.name}</span>{goal.note && <span style={{ fontSize: 10, color: T.dim, marginRight: 6 }}> · {goal.note}</span>}</div>
      <div style={{ direction: "ltr" }}><span style={{ fontSize: 18, fontWeight: 900, color: reached ? T.success : T.blue }}>{cur}</span><span style={{ fontSize: 12, color: T.dim }}> / {goal.value}</span><span style={{ fontSize: 10, color: T.dim }}> {goal.unit}</span></div>
      </div>
      <div style={{ background: "rgba(255,255,255,0.06)", borderRadius: 4, height: 6, overflow: "hidden" }}><div style={{ background: barColor, height: "100%", width: pct + "%", borderRadius: 4, transition: "width 0.4s ease" }} /></div>
      {h.length > 1 && <div style={{ display: "flex", alignItems: "flex-end", gap: 3, height: 28, marginTop: 8 }}>
      {h.map((x, i) => { const val = isTime ? x.maxT : x.maxW; const mn = Math.min(...h.map(y => isTime ? y.maxT : y.maxW)); const mx = Math.max(...h.map(y => isTime ? y.maxT : y.maxW)); const r = mx - mn || 1;
      return <div key={i} style={{ flex: 1, height: ((val - mn) / r) * 20 + 8, background: "linear-gradient(to top, " + barColor + ", " + barColor + "aa)", borderRadius: 2, minWidth: 4 }} />; })}</div>}
      {!h.length && <div style={{ fontSize: 11, color: T.dim, marginTop: 4 }}>אין נתונים עדיין</div>}
      </Card>; })}
      </div><Nav /></div>); }

      return null;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<WorkoutTracker />);
  </script>
</body>
</html>
